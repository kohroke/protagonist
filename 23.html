<p><span class="typeWriter" data-speed="10" data-text='
    ["2호선, 5번 칸, 편성 번호 2447. 15시 30분 역삼역 하차. 5번 개찰구 통과 1번 출구로 나와 인도를 걷다, 신성 저축 은행 앞, 15시 51분 휴대폰으로 10초간 통화. 200미터 이동 후 공중전화 2분간 통화. 전화번호부에 메모를 했고, 여기 필압이 남아있습니다. 15시 24분, 삼성역과 선릉역 사이 30대 여성, 쇼핑백. 특이사항 없습니다. 키 170 이상, 긴 머리, 카키색 코트. 신문? 놓친 것 같습니다. 놓쳤습니다. 20대 중반 남성, 호남형, 곤색 점퍼, 청바지, 회색 배낭. 확실합니다. 지금 반장님 뒤를 지나가고 있거든요. 불합격입니까? 예? 아…. 꽃사슴. 꿀꿀, 꽃돼지 마이크 테스트 중입니다, 아, 아. 하나, 모든 임무는 감시에서 시작해 감시로…. 하나, 모든 임무는 감시에서 시작해 감시로 끝난다. 둘, 허가된 임무 외에는 절대 개입하지 않는다. 셋, 노출된 즉시 임무에서 제외된다 이상입니다! 눈앞에서 사람이 죽는데도 철수합니까? 허가, 불가, 안 되고 못 한다, 뭐가 이렇게 복잡하죠? 대체 우리가 할 수 있는 일이 뭡니까? 저, 반장님! 이곳들이 지난 보름간 저희가 잠복했던 위치들입니다. 그리고 여기 빗금을 친 곳이 CCTV가 설치되지 않은 곳이고요. 잠복 범위가 잘못된 것 같습니다. 하마가 마지작으로 목격된 곳을 보면, 여기, 여기, 그리고 여기. 항상 카메라 사각으로 사라지는 걸 보면 하마는 머리를 쓴 겁니다. 그동안 저희는 하마가 마지막으로 목격된 곳을 중심으로만 잠복을 했습니다. 그래서 이렇게 세 곳을 이어 볼 수 있고, 앞으로 예정된 잠복 위치들. 이걸로 또 다른 삼각형을 만들 수 있습니다. 제 생각엔 이곳을 중심으로 잠복을 한다면…. 스타일 겹친다, 선배. 다녀왔습니다. 아, 나 완전 현장 체질인가봐. 사람 잘못 보신 거 같은데요? 처음 뵌 거 같은데? 그럴실 수도 있죠. 내가 흔하게 생겼나? 따라다녀요? 슬슬 불쾌해지려고 하는데. 계속 계실 거예요? 그림자를 잡았습니다. ",
    "감시자들 Cold Eyes, 2013, 하윤주"]
