<p><span class="typeWriter" data-speed="10" data-text='
    ["강 대리님. 제가, 제가 좀 이해가 안 돼서 그러는데요, 저, 저 정직원 시켜준다고 약속했었잖아요. 그럼 그거하고 이거는 어떻게 되는 거예요? 그럼 제가 정직원이 안 되는 거예요, 네? 그럼 정지원이 아니라도 일은 계속하는 거죠, 그쵸? 저기, 회사, 회사가…. 알바 구하고 있어요. 회사가 저기 계산대 알바생들 고용했다고. 저 생활비 벌러 나와요. 반찬값 아니고. 혜미 씨 보기에 제가 되게 바보 같았죠. 수당도 제대로 못 받으면서 연장근무 하고. 최 과장한테 굽신거리기나 하고. 왜 왔어. 경찰서에서 전화했든? 엄마 죄지은 거 아니야. 회사에서 정직원 지켜준다고 해놓고 약속 안 지키잖아. 혹시 아빠한테서 전화오면…. 응. 괜히 신경 쓸까 봐. 아저씨. 아들 같고 조카 같은 애를 왜 때려요. 왜 월급을 안 줘요? 그러면서 큰소리예요? 아저씨는 뭘 잘했다고 큰소리예요? 일을 시켰으면 제대로 월급을 주셔야 할 거 아니에요. 뭐 사람이 묵묵히 일만 하니까 쉬워보여요? 아저씨 마음대로 해도 될 것 같아요? 두 달 못 채우면 월급 제대로 안 줘도 된대요? 그건 누가 그래요. 저요, 전 변상 못 해요. 아저씨 애 때린 거 지금 당장 사과 하시고요. 월급 제대로 주세요. 당장. 나야, 선희.민수 어떠니? 괜찮니? 혜미야. 우리 마트 점거했을 때 비 오던 날 기억나니? 가끔 그때 생각이 나. 내가 너한테 앞장서줘서 고맙다고 그랬잖아. 나라면 꿈도 못 꿀 일을 네 덕분에 했어. 혜미야. 우리 나중에 그때처럼 즐겁게 일하자. 몇 달 전까지만 해도 저기 저 계산대에서 자조 같이 일만 했던 제가 이렇게 여러분 앞에 소리치고 있습니다. 저희가 바라는 건 대단한 게 아닙니다. 저희의 얘기를 좀 들어달라는 겁니다. 저희를 투명인간 취급하지 말아 달라는 거예요. 저희가 바라는 건…. 저희가 바라는 건 사람대접…. 사랍대접받는 거 하나입니다. 저희가 바라는 건 사람대접받는 거 하나입니다. ",
