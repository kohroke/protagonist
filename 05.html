<div class="typelighter_box">
<p><span class="typeWriter" data-speed="10" data-text='
    ["사람들이 왜 도박을 하냐구요? 글쎄요. 대부분 스릴 때문에 한다고 하잖아요? 따느냐 잃느냐. 근데 정말 그럴까요? 어느 날 고니가 얘기해 주더라고요. 사람들이 도박을 왜 하는지. 오케이, 자기가 내일 남편 화투치러 간 것 같다고 호구한테 전화해. 그래서 판때기에 같이 가. 그럼 판에 앉혀, 딱 이틀 잃어줘. 삼천씩. 육천 결제해주고. 아, 자기는 운전해줄 때마다 ‘사장님, 이러시면 안됩니다. 화투는 재미로 치셔야죠.’ 이거 사발 좀 풀어. 너무 꽉 죄지는 말고 적당히 살살, 알지? 마음이 좀 딸랑딸랑하게. 잘들 해. 여기 공사도 이번 주까지 마무리하고. 빨리 치고 빠져야 돼. 여기 돈 곧 마를거야. 건달들이 빠지기 시작하잖아. 아이… 이거는 정리 좀 하고. 이 창문은 막아!백화점 창문 없는 거 몰라? 해뜨는 거 보면서 화투 치고 싶겠어? 그날… 아 아니에요. 그날 화투 쳤어요. 섰다요. 아, 제가 항상 손발이 차고 막 그랬었는데, 화투패만 잡으면 그냥 화투 패만 탁 잡으면은 혈액 순환이 쫙 되는게… 하, 정말 내가 미쳤지, 미쳤어. 괜히 끼지 마세요. 그 사람들, 돈도 엄청 많고 화투도 되게 잘쳐요. 화투판에서 가장 어려운 일. 어떻게 호구를 판때기에 앉히느냐. 일단 호구를 앉히기만 하면 판돈 올리기는 아주 쉽다. 지금 이 마당에 착한 척 하세요? 먼저 가볍게 호구 돈을 따준다. 보통 호구들은 자본이 부족해서 돈을 잃는다고 생각한다. 그런 생각이 강하게 들도록 우선 절반만 빌려준다. 호구는 돈을 일는다. 그 돈은 다시 나에게 들어오고, 나는 그 돈을 다시 호구에게 빌려준다. 실제로 돈을 딴 사람은 아무도 없다. 돈은 그냥 돌고 돌 뿐. 그렇게 여러 번 반복하다보면 호구의 빚은 산더미처럼 불어난다. 그럼 슬슬 마지막 마무리를 날린다. 손이 거치네. 8대 2, 내가 8이야. 싫으면 법대로. 거기 서. 그대로는 못 가! 그년한테 가는 거야? 오케이. 그년한테 가는 건 좋은데, 그 돈은 내려놓고 가. 쏜다, 그 돈은 놓고 가. 쏠 수 있어! 쏠 수 있어! 화투. 말이 참 예뻐요. 꽃을 가지고 하는 싸움.내가 다른 판때기는 가지 말라고 했지? 이 바닥은 쪽이 팔리면 취직 안 되는 거 몰라? 나 이대 나온 여자야. 내가 어떻게 그런 데를 들어가? 하, 어린 게 말 받아치는 것 봐. 싸가지없이.",
    "타짜 The War Of Flower, 2008, 정마담"]
    '></span></p>
