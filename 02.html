<p><span class="typeWriter" data-speed="10" data-text='
    ["저 아세요? 근데 왜 별명이 팹시세요? 그동안 얼마 훔쳤어요? 그럼 어마어마하게 부자겠다, 그렇죠? 하하, 아니, 아이, 세상에 싸울 게 얼마나 많은데 자기랑도 싸우나 해서요. 아닌데, 나 되게 마음에 드는데. 언니가 내가 별론가 봐요. 그렇죠? 제가 좀 나이 많은 여자랑 잘 맞거든요. 저기요. 저희가 지금 시간이 없거든요? 알겠습니다. 이쁘긴. 내가 볼 때는 어마어마한 썅년 같아. 근데 쟤네 연애해? 아, 진짜. 홍콩에서 죽을 뻔 했네. 아유, 우리 새끼. 누나가 딸딸이 치나 안 치나 보러 왔다. 응? 보통 이런 상황에서 여자들은 굉장히 당황할 거야. 그렇지만 나는 아니야. 왜? 어렸을 때부터 이런 일이 종종 있었기 때문이지. 근데 너 이 새끼…. 키스할 때 입술에 힘 좀 빼라. 작업해야지, 넌 지갑이나 잘 빼. 씁, 10분 안에 끝난다. 그렇게 좋니? 난 향수 안 쓰지, 타고난 살냄새? 거기에 남자들이 죽잖아. 너 오늘 머리스타일 바뀌었네? 키스 잘하던데, 입술에 힘 쭉 빼고. 즐기면서. 허, 뒤쪽이 12cm야? 뚫다 죽겠다. 수고. 독해 봤자 술이죠, 뭐. 아저씨가 정말 하룻밤에 88억을 땄어요? 그 돈 땄을 때 딱 일어섰어야 됐는데. 아휴, 잃었을 때 그 기분이 어땠을까? 근데 마카오가 원래 이렇게 좀 더워요? 근데 그 다이아, 꼭 웨이홍이가 뭔가한테 팔아야 돼요? 난 빡세게 한번 쫓겨 봤으면 좋겠다. 쫓길 때 기분이 어떨까? ‘해피 엔딩 이즈 마인’. 난 꼭 이상하게 어렸을 때부터 해피 엔딩으로 끝나더라고요. 내가 아주 어마어마한 정보를 알고 있는데…. 나중에 가르쳐 줘야겠다. 아, 예니콜은 이 시점에서 멋지게 사라집니다. 믿어야지, 이런 상황에서. …. 이따 올라가서 얘기해 주면 안될까? 자 레디, 액션! 내가 진짜 내 인생을 던진다. 밑에서  기다려.",
