<p><span class="typeWriter" data-speed="10" data-text='
    ["당신은 나를 타마코, 불쌍한 조선인 하녀라고 생각하겠지. 하지만 내 진짜 이름은 남숙희다. 나면서부터 이 보영당에서 복순 씨라는 은포 최고의 장물아비, 아니 장물어미 손에 자라 일찍이 다섯 살 적에 진짜 돈, 가짜 돈을 구별할 줄 알았고, 그 후로는 이 구가이에게서 가짜 도장 파는 법을, 끝단이에게서는 소매치기 기술을 두루 익힌 몸이지만, 쯧. 이 아기들은 그런 쓸모 있는 재주는 못 배울 팔자다. 낳자마자 버려지는 핏덩이들. 우린 이것들을 씻기고 먹여서 일본에 팔아넘딘다. 얼마나 보람찬 일인가? 가만두면 굶어 죽을 것들을 부잣집 도련님, 아가씨로 만들어 주다니. 끝단이는 제 새끼 말고는 절대로 젖을 안 준다. 나 같으면 안 그래. 나도 젖이 나오면 얼마나 좋을까? 이 아기들을 다 먹여 줄 텐데. 사랑? 사기꾼이 사랑을 아나? 5만 받고, 나한텐 옷하고 패물에다가 따로 10만. 미치긴, 천만에. 한밑천 잡아서 조선 땅 뜬다. 조금만 참자, 이 시골뜨기 종년들. 염병. 이쁘면 이쁘다고 미리 말을 해 줘야 할 거 아니야. 사람 당황스럽게시리. 이즈미 히데코 아가씨께. 후지와라 백작님 말이 하녀를 찾으신다고요. 원래 하녀란 숟가락하고 아니… 젓가락과 비슷해서. 숟가락인가? 읽을 줄 몰라요, 아가씨. 어, 후지와라 백작님 말씀으로는…. 예? 아니요? 뵌 적은 없지만 이모, 그러니까 저희 이모한테서 전해 들었죠. 이모가 백작님 유모였거든요. 어, 아가씨 얼굴은…. 매일 밤 자기 전에 다시 생각나는 액수…. 생각나는 얼굴이래요. 저희 이모는요, 손님 오신다고 하면 먹던 숟가락도 놓고 아기씨를 씻겼대요. 손님이 아기한테서 좋은 냄새 난다고 그럴 때가 제일로 기뻤거든요. 아가씨는 제 아기씨세요. 이모가 아기 씻길 때 사탕을 물리거든요. 목욕이 얼마나 달콤한지 가르쳐 준다고. 왜 그러세요? 여지껏 내 손으로 씻기고 입힌 것들 중에 이만큼 이쁜 것이 있었나? 보영당 식구들한테 보여주고 싶다. 뭐라고들 할까? 다들 이러겠지? 아가씨는 수줍에 떨며 앉았고 신사분은 짖궂게 다가가고, 눈치 빠른 하녀는 두 상전을 위해 자리를 비켜 줬고, 잘들 하고 있어, 숙희야. 모두가 빌어먹게도 제 역할을 잘하고 있어. 니미럴. 나는 생각을 해야 돼. 나는 아주 부자가 되어서 아주아주 먼 항구에 가고 이름도 모르는 것들을 먹고 반짝거리는 것들을 잔뜩 사고 그리고 히데코 생각을 하지 않고. 히데코 생각을 절대…. 사랑하게 되실 거예요. ",
    "아가씨 The Handmaiden, 2016, 숙희"]
    '></span></p>
