    ["유세 첫날 밤에 후보님 마지막 일정이 어디였어요? 호텔? 그 시간에 거기서 술을 먹었어요? 누구랑요? 됐다. 그 사람은 노재순이랑 16년을 같이 있었던 인간이요. 이 동네 사람들은 하나도 못 믿겄다야. 아니요. 됐어요. 우리 민진이에 대한 경찰 수사 기록 좀 볼 수 있게 도와주세요. 16년동안 노재순이 꽉 잡고 있었으면 그 정도 줄은 있을 거잖아. 마지막으로 물을 게요. 그날 밤에 우리 민진이 아빠가 누구 만났는지 정말 몰라요? 민진이 수사 기록 가져와요. 노재순이 버리고 여기로 왔으면 우리가 믿어도 되는 사람이라는 걸 증명해봐요. 세상 쉽게 살려 하지 말고. 생각하자, 생각하자, 정신 똑바로 차리고. 생각하자, 생각하자 생각하자, 생각하자. 정신 똑바로 차리고 생각하자 생각하자. 처음으로 다시 돌아가서 생각해 보자. 처음으로 다시 돌아가서 생각해 보자. 그날은 남편의 유세 첫날이었고 나도 남편도 하루 종일 정신이 없었지. 나도 남편도 하루 종일 정신이 없었지.우리 딸은 내가 싸 준 김밥은 맛있게 먹었을까? 그때 그날, 그날 우리 민진이가 매일 부르던 노랫소리를 들었는데? 알아. 둘이 술 퍼마시면서 미래를 약속했겠지. 우린 이제 끝났어. 우린 끝났어. 우린 끝났고 선거고 정치고 뭐고 이제 다 필요 없어. 당신이 내 새끼 죽인 거야. 이성적으로 생각하자고? 솔직히 사무국장이 동정표 따내려고 내 새끼 죽였는지도 모른다고 나는 생각해. 아니면 당신이 선거에서 이기려고 사람 시켜서 내 새끼 죽였나? 미친 동네에서는 아무도 믿으면 안 돼! 여기는 애당초 인간 씨알부터가 근본도 없고 썩어 빠진 동네인께! 꺼져! 우리 민진이 교복 치마가 똥구멍이 다 보일 정도로 이렇게 짧은데 어, 무릎이 깨져서 피가 철철 났으면 내가 그걸 못 봤겠어? 솔직하게 말해, 너! 언제 깨졌어, 어? 10월의 프리 타임. 그것은 아빠 유세 첫날을 말하는 것이지. 그날은 엄마, 아빠도 바쁘니까. 이게 찔레꽃 나뭇가지야. ‘와일드 로즈 힐’은 찔레꽃 언덕. ‘열하나 반’은 밤 11시 반을 뜻하는 거겠지.’1억 개의 별’은 뭘까? 돈이야. 민진이가 생일 선물로 1억을 달라고 그랬었으니까. 너희 파티하려고 준비했지? 그 파티가 뭐였냐면, 그 파티가 뭐였냐면. 싫다. 그리고 난 안 멍청해. 우리 애 성적은 내가 모른 척한 거지 진짜로 몰랐던 게 아니야. 믿기 어렵겠지만 남들이 뭐라 해도 난 이 동네가 좋았었다. 여기는 내 남편이 태어난 곳이고 내 딸이 자라날 곳이었기 때문이다. ",
