    ["사진 너무 이쁘게 나왔다. 현서 엄마는 현서 죽은 거 알기나 할까? 왜 이래, 왜 이래요! 나와, 야! 저거 봐. 의사도 마스크를 안 써. 그래서…. 지금까지의 우리 얘길 안 믿는다는 거? 아빠. 현서가 지금 며칠째 굶은 거지? 하수구에서? 몇, 몇 층이야! 아, 저거 지하철역 기계에서 찍은 거지? 그런데 계속 우리 뉴스다. 별 특징이 없잖아, 작은오빠는. 진짜? 이거 심지어 복사마저 이면지에다 했네. 현서야! 그만 좀 투덜거려. 그럴 시간에 하수구 하나라도 더 뒤져봐, 좀. 어? 아빠, 미안. 빨리 깨워, 시간 없어. 네. 아, 놔! 아빠! 현서야! 나 남주야. 남주라니까! 진짜 찾았어, 엄청 큰 하수구. 원효대교 북쪽 바로 아래야. 남일이 오빠가 전화가 안 돼! 오빠!",
